# Alembic configuration for the cache DB.
#
# The script_location is pointed at the in-package migrations directory so
# the CLI works from a dev checkout.  At runtime the backend resolves the
# path via importlib.resources so it also works inside the PyInstaller
# sidecar bundle.
#
# Revision IDs are zero-padded integers (0001, 0002, ...) for sortability —
# always pass `--rev-id 000N` when running `alembic revision`.

[alembic]
script_location = backend/alembic
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# A dev-only URL.  The runtime URL is injected programmatically by
# backend.core.db.migrations; this is only used when the developer runs
# `uv run alembic check` / `revision --autogenerate` locally.
sqlalchemy.url = sqlite:///.alembic-scratch.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
