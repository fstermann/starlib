# ============================================================================
# Starlib Documentation – Zensical configuration
# ============================================================================

[project]
site_name = "Starlib"
site_description = "DJ library management app. Organise tracks, edit metadata, and manage artwork."
site_author = "Fabian Stermann"
repo_url = "https://github.com/fstermann/starlib"
repo_name = "fstermann/starlib"

copyright = "Copyright &copy; 2025 – 2026 Fabian Stermann"

dev_addr = "localhost:8200"

extra_css = ["assets/stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
    { "Overview" = "guide/index.md" },
    { "Installation" = "guide/installation.md" },
    { "Setup" = "guide/setup.md" },
    { "Features" = "guide/features.md" },
  ] },
  { "Technical" = [
    { "Overview" = "technical/index.md" },
    { "Getting Started" = "technical/getting-started.md" },
    { "Architecture" = "technical/architecture.md" },
    { "Backend" = "technical/backend.md" },
    { "Frontend" = "technical/frontend.md" },
    { "Desktop" = "technical/desktop.md" },
    { "Authentication" = "technical/authentication.md" },
  ] },
]

# ----------------------------------------------------------------------------
# Markdown extensions (defaults + custom vars extension for {{ key }} support)
# ----------------------------------------------------------------------------
[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
"docs.extensions.vars" = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx]
arithmatex = {generic = true}
betterem = {}
caret = {}
details = {}
highlight = {anchor_linenums = true, line_spans = "__span", pygments_lang_class = true}
inlinehilite = {}
keys = {}
magiclink = {}
mark = {}
smartsymbols = {}
tasklist = {custom_checkbox = true}
tilde = {}

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [{name = "mermaid", class = "mermaid"}]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
logo = "assets/images/starlib-logo.png"
favicon = "assets/images/starlib-icon.png"

features = [
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/fstermann/starlib"
