version: 2

updates:
  # Python (uv) - root pyproject.toml
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm - frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # npm - desktop
  - package-ecosystem: "npm"
    directory: "/desktop"
    schedule:
      interval: "weekly"

  # Cargo - Rust/Tauri
  - package-ecosystem: "cargo"
    directory: "/desktop/src-tauri"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # pre-commit hooks
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
