name: Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Version bump type"
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

env:
    # ── Python backend sidecar binary name (must match tauri.conf.json externalBin)
    SIDECAR_NAME: starlib-backend
    # ── Node version for the frontend build
    NODE_VERSION: "22"
    # ── Python version for PyInstaller
    PYTHON_VERSION: "3.13"

jobs:
    # ────────────────────────────────────────────────────────────────────────
    # Job 0: Bump version, commit, tag, and push
    # ────────────────────────────────────────────────────────────────────────
    bump-version:
        runs-on: ubuntu-latest
        outputs:
            new_version: ${{ steps.bump.outputs.new_version }}
            old_version: ${{ steps.bump.outputs.old_version }}
            tag: ${{ steps.bump.outputs.tag }}
        steps:
            - uses: actions/checkout@v6

            - name: Bump version
              id: bump
              shell: bash
              run: |
                  # Read current version from pyproject.toml
                  CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

                  case "${{ inputs.bump }}" in
                    major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                    minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                    patch) PATCH=$((PATCH + 1)) ;;
                  esac

                  NEW="${MAJOR}.${MINOR}.${PATCH}"
                  echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
                  echo "old_version=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
                  echo "Bumping $CURRENT → $NEW"

            - name: Update version in all files
              shell: bash
              run: |
                  NEW="${{ steps.bump.outputs.new_version }}"
                  CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

                  # pyproject.toml
                  sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml

                  # desktop/src-tauri/Cargo.toml (only the package version line)
                  sed -i "0,/^version = \"$CURRENT\"/s//version = \"$NEW\"/" desktop/src-tauri/Cargo.toml

                  # JSON files
                  for f in desktop/package.json frontend/package.json desktop/src-tauri/tauri.conf.json; do
                    sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" "$f"
                  done

            - name: Commit and tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "release: v${{ steps.bump.outputs.new_version }}"
                  git tag "v${{ steps.bump.outputs.new_version }}"
                  git push origin HEAD --tags

    # ────────────────────────────────────────────────────────────────────────
    # Job 1: Build the Python backend sidecar (macOS arm64 + optionally x86_64)
    # ────────────────────────────────────────────────────────────────────────
    build-sidecar:
        needs: bump-version
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest # Apple Silicon (arm64)
                      arch: aarch64-apple-darwin
                    - platform: macos-15 # Intel (x86_64)
                      arch: x86_64-apple-darwin
                    # Uncomment to add Windows support:
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Sidecar (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.bump-version.outputs.tag }}

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install uv
              run: pip install uv

            - name: Install Python dependencies
              run: uv pip install --system -e "." pyinstaller

            - name: Build sidecar with PyInstaller
              run: |
                  pyinstaller desktop/sidecar.spec --distpath desktop/src-tauri/binaries --noconfirm

            # Tauri expects the sidecar binary to be named
            # `sct-backend-<target-triple>` in the binaries/ directory.
            - name: Rename sidecar binary for Tauri
              shell: bash
              run: |
                  EXT=""
                  if [[ "${{ matrix.arch }}" == *"windows"* ]]; then EXT=".exe"; fi
                  mv desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}${EXT} \
                     desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}${EXT}

            - name: Upload sidecar artifact
              uses: actions/upload-artifact@v7
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}*
                  if-no-files-found: error

    # ────────────────────────────────────────────────────────────────────────
    # Job 2: Build the Tauri desktop app (depends on sidecar artifacts)
    # ────────────────────────────────────────────────────────────────────────
    build-tauri:
        needs: [bump-version, build-sidecar]
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      arch: aarch64-apple-darwin
                      tauri-target: aarch64-apple-darwin
                    - platform: macos-15
                      arch: x86_64-apple-darwin
                      tauri-target: x86_64-apple-darwin
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc
                    #   tauri-target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Tauri (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.bump-version.outputs.tag }}

            # ── Download pre-built sidecar binary ──────────────────────────────
            - name: Download sidecar artifact
              uses: actions/download-artifact@v8
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/

            - name: Make sidecar executable
              if: runner.os != 'Windows'
              run: chmod +x desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}

            # ── Rust toolchain ──────────────────────────────────────────────────
            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.tauri-target }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./desktop/src-tauri -> target"

            # ── Node + frontend build ───────────────────────────────────────────
            - name: Set up Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Build frontend (static export)
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: "http://127.0.0.1:8000"
              run: npm run build

            # ── App icons ───────────────────────────────────────────────────────
            # If you have committed real icons, skip this step.
            # Otherwise this generates placeholder icons via ImageMagick (pre-installed on macOS runners).
            - name: Generate placeholder icons (if missing)
              shell: bash
              run: |
                  ICONS_DIR="desktop/src-tauri/icons"
                  if [ ! -f "$ICONS_DIR/icon.png" ]; then
                    echo "Generating placeholder icon..."
                    convert -size 512x512 xc:#f97316 \
                      -fill white -font Helvetica-Bold -pointsize 120 \
                      -gravity center -annotate 0 "Starlib" \
                      "$ICONS_DIR/icon.png"
                    for size in 32 128; do
                      convert "$ICONS_DIR/icon.png" -resize ${size}x${size} "$ICONS_DIR/${size}x${size}.png"
                    done
                    convert "$ICONS_DIR/icon.png" -resize 256x256 "$ICONS_DIR/128x128@2x.png"
                    mkdir -p /tmp/icon.iconset
                    for s in 16 32 64 128 256 512; do
                      convert "$ICONS_DIR/icon.png" -resize ${s}x${s} "/tmp/icon.iconset/icon_${s}x${s}.png"
                      convert "$ICONS_DIR/icon.png" -resize $((s*2))x$((s*2)) "/tmp/icon.iconset/icon_${s}x${s}@2x.png"
                    done
                    iconutil -c icns /tmp/icon.iconset -o "$ICONS_DIR/icon.icns"
                  fi

            # ── macOS code signing (optional) ───────────────────────────────────
            # Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
            # APPLE_ID_PASSWORD, APPLE_TEAM_ID as repo secrets to enable signing.
            # Without these, the app still builds and runs (users bypass Gatekeeper
            # via right-click → Open on first launch).

            # ── Tauri build ─────────────────────────────────────────────────────
            - name: Install Tauri CLI
              working-directory: desktop
              run: npm install

            - name: Build Tauri app
              working-directory: desktop
              env:
                  # Updater signing key — generate with: cd desktop && npx @tauri-apps/cli signer generate
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # macOS signing (optional)
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: npx @tauri-apps/cli build --target ${{ matrix.tauri-target }} --config src-tauri/tauri.conf.json

            - name: Upload Tauri bundles
              uses: actions/upload-artifact@v7
              with:
                  name: bundle-${{ matrix.arch }}
                  path: |
                      desktop/src-tauri/target/${{ matrix.tauri-target }}/release/bundle/dmg/*.dmg
                      desktop/src-tauri/target/${{ matrix.tauri-target }}/release/bundle/macos/*.app.tar.gz
                      desktop/src-tauri/target/${{ matrix.tauri-target }}/release/bundle/msi/*.msi
                      desktop/src-tauri/target/${{ matrix.tauri-target }}/release/bundle/nsis/*.exe
                  if-no-files-found: error

    # ────────────────────────────────────────────────────────────────────────
    # Job 3: Create GitHub Release and upload all artifacts
    # ────────────────────────────────────────────────────────────────────────
    release:
        needs: [bump-version, build-tauri]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.bump-version.outputs.tag }}

            - name: Download all bundle artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: bundle-*
                  path: artifacts/
                  merge-multiple: true

            - name: List artifacts
              run: find artifacts/ -type f | sort

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.bump-version.outputs.tag }}
                  name: "Starlib ${{ needs.bump-version.outputs.tag }}"
                  body: |
                      ## Starlib ${{ needs.bump-version.outputs.tag }}

                      ### Installation (macOS)
                      1. Download the `.dmg` file for your Mac:
                         - **Apple Silicon (M1/M2/M3):** `*-aarch64.dmg`
                         - **Intel:** `*-x86_64.dmg`
                      2. Open the `.dmg` and drag **Starlib** to your Applications folder.
                      3. On first launch, right-click → Open if macOS shows an unidentified developer warning.
                      4. Follow the setup wizard to enter your SoundCloud API credentials.

                      ### Getting SoundCloud API credentials
                      Register a free app at https://soundcloud.com/you/apps, then copy your Client ID and Client Secret.
                  files: |
                      artifacts/**/*.dmg
                      artifacts/**/*.app.tar.gz
                      artifacts/**/*.msi
                      artifacts/**/*.exe
                  draft: false
                  prerelease: false
                  generate_release_notes: true

    # ────────────────────────────────────────────────────────────────────────
    # Job 4: Clean up on failure — revert version bump, delete tag & release
    # ────────────────────────────────────────────────────────────────────────
    cleanup-on-failure:
        needs: [bump-version, build-sidecar, build-tauri, release]
        if: ${{ always() && needs.bump-version.result == 'success' && (needs.build-sidecar.result == 'failure' || needs.build-tauri.result == 'failure' || needs.release.result == 'failure') }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0

            - name: Delete GitHub Release (if created)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release delete "${{ needs.bump-version.outputs.tag }}" --yes --cleanup-tag || true

            - name: Delete remote tag
              run: git push origin --delete "refs/tags/${{ needs.bump-version.outputs.tag }}" || true

            - name: Revert version bump commit
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git pull --rebase origin ${{ github.ref_name }}
                  git revert --no-edit HEAD -m 1 || git revert --no-edit HEAD
                  git commit --amend -m "release(revert): v${{ needs.bump-version.outputs.new_version }} → v${{ needs.bump-version.outputs.old_version }}"
                  git push origin HEAD:${{ github.ref_name }}
