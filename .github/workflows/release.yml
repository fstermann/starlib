name: Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Version bump type"
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

env:
    # ── Python backend sidecar binary name (must match tauri.conf.json externalBin)
    SIDECAR_NAME: starlib-backend
    # ── Node version for the frontend build
    NODE_VERSION: "22"
    # ── Python version for PyInstaller
    PYTHON_VERSION: "3.13"

jobs:
    # ────────────────────────────────────────────────────────────────────────
    # Job 0: Bump version, commit, tag, and push
    # ────────────────────────────────────────────────────────────────────────
    bump-version:
        runs-on: ubuntu-latest
        outputs:
            new_version: ${{ steps.bump.outputs.new_version }}
            old_version: ${{ steps.bump.outputs.old_version }}
            tag: ${{ steps.bump.outputs.tag }}
        steps:
            - uses: actions/checkout@v6

            - name: Bump version
              id: bump
              shell: bash
              run: |
                  # Read current version from pyproject.toml
                  CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

                  case "${{ inputs.bump }}" in
                    major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                    minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                    patch) PATCH=$((PATCH + 1)) ;;
                  esac

                  NEW="${MAJOR}.${MINOR}.${PATCH}"
                  echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
                  echo "old_version=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
                  echo "Bumping $CURRENT → $NEW"

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install uv
              run: pip install uv

            - name: Set up Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Update version in all files
              shell: bash
              run: |
                  NEW="${{ steps.bump.outputs.new_version }}"

                  # pyproject.toml + uv.lock
                  uv version "$NEW"

                  # desktop/src-tauri/Cargo.toml + Cargo.lock
                  sed -i "0,/^version = \".*\"/s//version = \"$NEW\"/" desktop/src-tauri/Cargo.toml
                  cargo update --workspace

                  # desktop/package.json + desktop/package-lock.json
                  npm version "$NEW" --no-git-tag-version --prefix desktop

                  # frontend/package.json + frontend/package-lock.json
                  npm version "$NEW" --no-git-tag-version --prefix frontend

                  # desktop/src-tauri/tauri.conf.json
                  jq --indent 4 --arg v "$NEW" '.version = $v' desktop/src-tauri/tauri.conf.json > tmp.json
                  mv tmp.json desktop/src-tauri/tauri.conf.json

            - name: Commit and tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "release: v${{ steps.bump.outputs.old_version }} → v${{ steps.bump.outputs.new_version }}"
                  git tag "v${{ steps.bump.outputs.new_version }}"
                  git push origin HEAD --tags

    # ────────────────────────────────────────────────────────────────────────
    # Job 1: Build the Python backend sidecar (macOS arm64 + optionally x86_64)
    # ────────────────────────────────────────────────────────────────────────
    build-sidecar:
        needs: bump-version
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest # Apple Silicon (arm64)
                      arch: aarch64-apple-darwin
                    - platform: macos-15 # Intel (x86_64)
                      arch: x86_64-apple-darwin
                    # Uncomment to add Windows support:
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Sidecar (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.bump-version.outputs.tag }}

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install uv
              run: pip install uv

            - name: Install Python dependencies
              run: uv pip install --system -e "." pyinstaller

            - name: Build sidecar with PyInstaller
              run: |
                  pyinstaller desktop/sidecar.spec --distpath desktop/src-tauri/binaries --noconfirm

            # Tauri expects the sidecar binary to be named
            # `starlib-backend-<target-triple>` in the binaries/ directory.
            - name: Rename sidecar binary for Tauri
              shell: bash
              run: |
                  EXT=""
                  if [[ "${{ matrix.arch }}" == *"windows"* ]]; then EXT=".exe"; fi
                  mv desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}${EXT} \
                     desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}${EXT}

            - name: Upload sidecar artifact
              uses: actions/upload-artifact@v7
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}*
                  if-no-files-found: error

    # ────────────────────────────────────────────────────────────────────────
    # Job 2: Build and release the Tauri desktop app via tauri-apps/tauri-action
    #
    # tauri-action handles: Tauri build, latest.json generation, GitHub Release
    # creation, and artifact upload. We handle ad-hoc codesign after.
    # ────────────────────────────────────────────────────────────────────────
    build-tauri:
        needs: [bump-version, build-sidecar]
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      arch: aarch64-apple-darwin
                      tauri-target: aarch64-apple-darwin
                    - platform: macos-15
                      arch: x86_64-apple-darwin
                      tauri-target: x86_64-apple-darwin
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc
                    #   tauri-target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Tauri (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.bump-version.outputs.tag }}

            # ── Download pre-built sidecar binary ──────────────────────────────
            - name: Download sidecar artifact
              uses: actions/download-artifact@v8
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/

            - name: Make sidecar executable
              run: chmod +x desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}

            # ── Rust toolchain ──────────────────────────────────────────────────
            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.tauri-target }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: ". -> target"

            # ── Node + frontend build ───────────────────────────────────────────
            - name: Set up Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Build frontend (static export)
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: "http://127.0.0.1:8000"
              run: npm run build

            # ── Desktop npm deps (needed so tauri-action finds the local CLI) ───
            - name: Install desktop dependencies
              working-directory: desktop
              run: npm install

            # ── Forward only non-empty Apple signing secrets into GITHUB_ENV ────
            # Tauri errors if signing env vars are set to empty strings, so we
            # only export them when the corresponding secret is actually populated.
            - name: Propagate Apple signing secrets
              shell: bash
              env:
                  _APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  _APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  _APPLE_ID: ${{ secrets.APPLE_ID }}
                  _APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  declare -A MAPPING=(
                    [APPLE_CERTIFICATE]=_APPLE_CERTIFICATE
                    [APPLE_CERTIFICATE_PASSWORD]=_APPLE_CERTIFICATE_PASSWORD
                    [APPLE_ID]=_APPLE_ID
                    [APPLE_ID_PASSWORD]=_APPLE_ID_PASSWORD
                    [APPLE_TEAM_ID]=_APPLE_TEAM_ID
                  )
                  for dest in "${!MAPPING[@]}"; do
                    src="${MAPPING[$dest]}"
                    val="${!src}"
                    if [[ -n "$val" ]]; then
                      echo "${dest}=${val}" >> "$GITHUB_ENV"
                    fi
                  done

            # ── tauri-action: build, create release, upload artifacts + latest.json
            - name: Build and release
              uses: tauri-apps/tauri-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: desktop
                  tagName: ${{ needs.bump-version.outputs.tag }}
                  releaseName: "Starlib ${{ needs.bump-version.outputs.tag }}"
                  releaseBody: |
                      ## Starlib ${{ needs.bump-version.outputs.tag }}

                      ### Installation (macOS)

                      1. Download the `.dmg` file for your Mac:
                         - **Apple Silicon (M1/M2/M3):** `*-aarch64.dmg`
                         - **Intel:** `*-x86_64.dmg`
                      2. Open the `.dmg` and drag **Starlib** to your Applications folder.
                      3. Remove the macOS quarantine flag (required for unsigned builds):
                         ```bash
                         xattr -cr /Applications/Starlib.app
                         ```
                      4. Follow the setup wizard to enter your SoundCloud API credentials.

                      ### Getting SoundCloud API credentials
                      Register a free app at https://soundcloud.com/you/apps, then copy your Client ID and Client Secret.
                  releaseDraft: false
                  prerelease: false
                  generateReleaseNotes: true
                  args: --target ${{ matrix.tauri-target }}

            # ── Ad-hoc codesign (run after tauri-action, .app still on disk) ──────
            # macOS requires at least an ad-hoc signature for WebKit to load
            # content inside the webview. Without this, the app shows "Load failed".
            - name: Ad-hoc codesign (when Apple signing is not configured)
              shell: bash
              run: |
                  APP_PATH="target/${{ matrix.tauri-target }}/release/bundle/macos/Starlib.app"
                  # Skip if the app is already properly signed (Apple identity was used)
                  if ! codesign -v "$APP_PATH" 2>/dev/null; then
                    codesign --force --deep --sign - "$APP_PATH"
                  fi

    # ────────────────────────────────────────────────────────────────────────
    # Job 3: Clean up on failure — revert version bump, delete tag & release
    # ────────────────────────────────────────────────────────────────────────
    cleanup-on-failure:
        needs: [bump-version, build-sidecar, build-tauri]
        if: ${{ always() && needs.bump-version.result == 'success' && (needs.build-sidecar.result == 'failure' || needs.build-tauri.result == 'failure') }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref }}
                  fetch-depth: 0

            - name: Delete GitHub Release (if created)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release delete "${{ needs.bump-version.outputs.tag }}" --yes --cleanup-tag || true

            - name: Delete remote tag
              run: git push origin --delete "refs/tags/${{ needs.bump-version.outputs.tag }}" || true

            - name: Revert version bump commit
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git pull --rebase origin ${{ github.ref_name }}
                  git revert --no-edit HEAD -m 1 || git revert --no-edit HEAD
                  git commit --amend -m "release(revert): v${{ needs.bump-version.outputs.new_version }} → v${{ needs.bump-version.outputs.old_version }}"
                  git push origin HEAD:${{ github.ref_name }}
