name: Release build

# Builds the Python sidecar + Tauri desktop app for a tagged release and uploads
# the artifacts to the matching GitHub Release.
#
# Invoked by release-please.yml when a release PR merges (the `build` job passes
# the freshly-created tag), or manually via workflow_dispatch to (re)build an
# existing tag. Versioning, tagging, changelog and release creation all live in
# release-please — this workflow only compiles and attaches artifacts.

on:
    workflow_call:
        inputs:
            tag:
                description: "Release tag to build (e.g. v0.6.0)"
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing release tag to (re)build (e.g. v0.6.0)"
                required: true
                type: string

env:
    # ── Python backend sidecar binary name (must match tauri.conf.json externalBin)
    SIDECAR_NAME: starlib-backend
    # ── Node version for the frontend build
    NODE_VERSION: "22"
    # ── Python version for PyInstaller
    PYTHON_VERSION: "3.13"

jobs:
    # ────────────────────────────────────────────────────────────────────────
    # Job 1: Build the Python backend sidecar (macOS arm64 + optionally x86_64)
    # ────────────────────────────────────────────────────────────────────────
    build-sidecar:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest # Apple Silicon (arm64)
                      arch: aarch64-apple-darwin
                    - platform: macos-15 # Intel (x86_64)
                      arch: x86_64-apple-darwin
                    # Uncomment to add Windows support:
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Sidecar (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ inputs.tag }}

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Install uv
              run: pip install uv

            - name: Install Python dependencies
              run: uv pip install --system -e "." pyinstaller

            - name: Download bundled ffmpeg
              shell: bash
              run: |
                  mkdir -p desktop/bin
                  case "${{ matrix.arch }}" in
                    aarch64-apple-darwin)
                      URL="https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64" ;;
                    x86_64-apple-darwin)
                      URL="https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-x64" ;;
                    x86_64-pc-windows-msvc)
                      URL="https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-win32-x64" ;;
                    *)
                      echo "No prebuilt ffmpeg for ${{ matrix.arch }}, skipping"; exit 0 ;;
                  esac
                  curl -L -o desktop/bin/ffmpeg "$URL"
                  chmod +x desktop/bin/ffmpeg

            - name: Build sidecar with PyInstaller
              run: |
                  pyinstaller desktop/sidecar.spec --distpath desktop/src-tauri/binaries --noconfirm

            # Tauri expects the sidecar binary to be named
            # `starlib-backend-<target-triple>` in the binaries/ directory.
            - name: Rename sidecar binary for Tauri
              shell: bash
              run: |
                  EXT=""
                  if [[ "${{ matrix.arch }}" == *"windows"* ]]; then EXT=".exe"; fi
                  mv desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}${EXT} \
                     desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}${EXT}

            - name: Upload sidecar artifact
              uses: actions/upload-artifact@v7
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}*
                  if-no-files-found: error

    # ────────────────────────────────────────────────────────────────────────
    # Job 2: Build and release the Tauri desktop app via tauri-apps/tauri-action
    #
    # tauri-action handles: Tauri build, latest.json generation, uploading the
    # artifacts to the existing GitHub Release, and codesign after.
    # ────────────────────────────────────────────────────────────────────────
    build-tauri:
        needs: build-sidecar
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      arch: aarch64-apple-darwin
                      tauri-target: aarch64-apple-darwin
                    - platform: macos-15
                      arch: x86_64-apple-darwin
                      tauri-target: x86_64-apple-darwin
                    # - platform: windows-latest
                    #   arch: x86_64-pc-windows-msvc
                    #   tauri-target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform }}
        name: Tauri (${{ matrix.arch }})

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ inputs.tag }}

            # ── Download pre-built sidecar binary ──────────────────────────────
            - name: Download sidecar artifact
              uses: actions/download-artifact@v8
              with:
                  name: sidecar-${{ matrix.arch }}
                  path: desktop/src-tauri/binaries/

            - name: Make sidecar executable
              run: chmod +x desktop/src-tauri/binaries/${{ env.SIDECAR_NAME }}-${{ matrix.arch }}

            # ── Rust toolchain ──────────────────────────────────────────────────
            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.tauri-target }}

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: ". -> target"

            # ── Node + frontend build ───────────────────────────────────────────
            - name: Set up Node ${{ env.NODE_VERSION }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: |
                      frontend/package-lock.json
                      desktop/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Build frontend (static export)
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: "http://127.0.0.1:8000"
              run: npm run build

            # ── Desktop npm deps (needed so tauri-action finds the local CLI) ───
            - name: Install desktop dependencies
              working-directory: desktop
              run: npm install

            # ── tauri-action: build, upload artifacts + latest.json to the release
            - name: Build and release
              uses: tauri-apps/tauri-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: desktop
                  tagName: ${{ inputs.tag }}
                  releaseName: "Starlib ${{ inputs.tag }}"
                  releaseBody: |
                      ## Starlib ${{ inputs.tag }}

                      ### Installation (macOS)

                      1. Download the `.dmg` file for your Mac:
                         - **Apple Silicon (M1/M2/M3):** `*-aarch64.dmg`
                         - **Intel:** `*-x86_64.dmg`
                      2. Open the `.dmg` and drag **Starlib** to your Applications folder.
                      3. Remove the macOS quarantine flag (required for unsigned builds):
                         ```bash
                         xattr -cr /Applications/Starlib.app
                         ```
                      4. Follow the setup wizard to enter your SoundCloud API credentials.

                      ### Getting SoundCloud API credentials
                      Register a free app at https://soundcloud.com/you/apps, then copy your Client ID and Client Secret.
                  releaseDraft: false
                  prerelease: false
                  generateReleaseNotes: true
                  args: --target ${{ matrix.tauri-target }}
